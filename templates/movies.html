{% extends "base.html" %}

{% block title %}Movies{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2>Movies</h2>
    <a href="{{ url_for('add_movie') }}" class="btn btn-danger">+ Add</a>
</div>

<div class="row">
{% for movie in movies %}
<div class="col-md-3 mb-4">
    <div class="card bg-dark text-white">

        <img src="{{ movie.poster_url }}" class="card-img-top" style="height:250px; object-fit:cover;">

        <div class="card-body">
            <h5>{{ movie.title }}</h5>
            <p>{{ movie.genre }}</p>
            <p>{{ movie.duration_min }} min</p>
        </div>

    </div>
</div>
{% endfor %}
</div>
{% endblock %}
